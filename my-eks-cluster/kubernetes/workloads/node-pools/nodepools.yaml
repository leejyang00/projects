apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: eks-playground-nodepool
spec:
  template:
    metadata:
      labels:
        billing-team: my-team
    spec:
      nodeClassRef:
        group: eks.amazonaws.com
        kind: NodeClass
        name: eks-playground-nodeclass

      requirements:
        # Spot only - up to 90% cheaper
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot"]

        # Constrain to cheap instance families
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["t3.medium", "t3a.medium", "t3.large", "t3a.large"]

        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]

        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
  limits:
    cpu: "16"
    memory: "16Gi"
  
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 50s