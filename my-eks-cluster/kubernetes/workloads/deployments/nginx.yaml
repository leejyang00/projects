################################################################################
# Test Workload — nginx
#
# Purpose: Validate the cluster can schedule pods, run containers,
# and route traffic. This is your "it works" proof before adding
# ingress and load balancers.
#
# What we're testing:
#   ✓ Pods schedule on spot nodes
#   ✓ Container images pull successfully (nodes → NAT → internet → ECR/Docker Hub)
#   ✓ Pod networking works (VPC CNI assigns IPs)
#   ✓ Service discovery works (CoreDNS resolves service names)
#   ✓ Health probes work (kubelet checks liveness/readiness)
#   ✓ Inter-pod traffic works (Service → Pod routing via kube-proxy)
################################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: default
  labels:
    app: nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - nginx
              topologyKey: "kubernetes.io/zone" # node's label for AZ
      #########################################################################
      # Resource Requests & Limits
      #
      # requests: the MINIMUM resources guaranteed to this pod.
      #   - The scheduler uses this to decide which node to place the pod on
      #   - If a node has 2GB RAM and 1.8GB is requested, a pod requesting
      #     500m RAM won't schedule there (even if actual usage is low)
      #
      # limits: the MAXIMUM the pod can use.
      #   - CPU limit: pod gets throttled (slowed down) if it exceeds
      #   - Memory limit: pod gets OOMKilled if it exceeds
      #
      # Why set both? Without requests, the scheduler has no idea how much
      # resource the pod needs and may overpack nodes. Without limits, one
      # runaway pod can starve everything else on the node.
      #
      # t3.small has 2 vCPU + 2GB RAM. With 2 replicas of this pod plus
      # system pods (CoreDNS, kube-proxy, vpc-cni), we're well within capacity.
      #########################################################################
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 50m # 0.05 vCPU — nginx barely uses CPU when idle
              memory: 64Mi # 64MB — alpine nginx is tiny
            limits:
              cpu: 100m # Throttle at 0.1 vCPU
              memory: 128Mi # OOMKill at 128MB

          ###################################################################
          # Health Probes
          #
          # readinessProbe: "Is this pod ready to receive traffic?"
          #   - Fails → pod is removed from the Service's endpoint list
          #   - Succeeds → pod receives traffic again
          #   - Use case: pod is alive but still loading config, warming cache
          #
          # livenessProbe: "Is this pod still alive?"
          #   - Fails → kubelet RESTARTS the container
          #   - Use case: process is deadlocked, hanging, or corrupt state
          #   - Be careful: aggressive livenessProbe = restart loops
          #
          # Why both? A pod can be alive (liveness passes) but not ready
          # to serve (readiness fails). Example: during a deployment rollout,
          # new pods start but shouldn't get traffic until they're ready.
          #
          # initialDelaySeconds: wait before first check (give the app time to start)
          # periodSeconds: how often to check
          # failureThreshold: how many consecutive failures before acting
          ###################################################################
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3

---
################################################################################
# Service — ClusterIP
#
# A Service is a stable network endpoint for a set of pods.
# Pods are ephemeral (they get new IPs when restarted), but the
# Service keeps a fixed ClusterIP that never changes.
#
# ClusterIP (default type): only reachable from INSIDE the cluster.
# This is intentional — we don't want to expose nginx to the internet yet.
# That's the job of an Ingress + Load Balancer Controller (step 2).
#
# How it works:
#   1. Service selector matches pods with label "app: nginx"
#   2. kube-proxy programs iptables rules on every node
#   3. Traffic to ClusterIP:80 → round-robin to matching pods on port 80
#   4. CoreDNS creates a DNS record: nginx.default.svc.cluster.local → ClusterIP
################################################################################
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: default
  labels:
    app: nginx
spec:
  type: ClusterIP
  selector:
    app: nginx
  ports:
    - name: http
      port: 80
      targetPort: http # References the named port on the container
      protocol: TCP
