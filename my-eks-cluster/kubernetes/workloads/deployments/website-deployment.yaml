################################################################################
# Website Workload — nginx with custom content
#
# Serves as the "website" at path /
# Uses a ConfigMap for the HTML so you can change content without rebuilding
################################################################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-html
  namespace: default
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <title>EKS Playground</title>
      <style>
        body {
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
          display: flex;
          justify-content: center;
          align-items: center;
          min-height: 100vh;
          margin: 0;
          background: #1a1a2e;
          color: #e0e0e0;
        }
        .card {
          background: #16213e;
          border-radius: 12px;
          padding: 40px;
          max-width: 500px;
          box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        h1 { color: #00d4ff; margin-top: 0; }
        .info { color: #888; font-size: 14px; margin-top: 20px; }
        code { background: #0f3460; padding: 2px 8px; border-radius: 4px; }
        a { color: #00d4ff; }
      </style>
    </head>
    <body>
      <div class="card">
        <h1>EKS Playground</h1>
        <p>This is the <strong>website</strong> service running on nginx.</p>
        <p>Served from path: <code>/</code></p>
        <p>Try the echo service: <a href="/echo/">/echo/</a></p>
        <div class="info">
          <p>Pod: <strong>__HOSTNAME__</strong></p>
        </div>
      </div>
    </body>
    </html>

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: website
  namespace: default
  labels:
    app: website
spec:
  replicas: 2
  selector:
    matchLabels:
      app: website
  template:
    metadata:
      labels:
        app: website
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - website
              topologyKey: "kubernetes.io/zone" # node's label for AZ
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          # Mount the ConfigMap to a staging path, then copy to a writable dir
          volumeMounts:
            - name: html-src
              mountPath: /usr/share/nginx/html-src
              readOnly: true
            - name: html
              mountPath: /usr/share/nginx/html
          # Copy HTML from read-only ConfigMap to writable emptyDir,
          # then inject the pod hostname
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    cp /usr/share/nginx/html-src/* /usr/share/nginx/html/
                    sed -i "s/__HOSTNAME__/$(hostname)/" /usr/share/nginx/html/index.html
      volumes:
        - name: html-src
          configMap:
            name: nginx-html
        - name: html
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: website
  namespace: default
  labels:
    app: website
spec:
  type: ClusterIP
  selector:
    app: website
  ports:
    - name: http
      port: 80
      targetPort: http