################################################################################
# Echo Service
#
# Returns JSON with request details: path, headers, method, query params.
# Useful for:
#   - Proving path-based routing works (you can see the actual path received)
#   - Seeing what headers the ALB adds (X-Forwarded-For, X-Forwarded-Proto)
#   - Testing during Gateway API migration (verify routes work)
#
# Serves at path /echo/
################################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo
  namespace: default
  labels:
    app: echo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: echo
  template:
    metadata:
      labels:
        app: echo
    spec:
      containers:
        - name: echo
          # ealen/echo-server returns JSON with full request details
          # Lightweight, no config needed, perfect for routing validation
          image: ealen/echo-server:0.9.2
          ports:
            - name: http
              containerPort: 80
          env:
            # Port to listen on
            - name: PORT
              value: "80"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: echo
  namespace: default
  labels:
    app: echo
spec:
  type: ClusterIP
  selector:
    app: echo
  ports:
    - name: http
      port: 80
      targetPort: http