apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-ingress
  namespace: default
  annotations:
    # Tell the LB Controller this Ingress should create an ALB (not NLB)
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: eks-playground-lbc

    # Listen on port 80 (HTTP). We'll add HTTPS + cert later.
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'

    # Health check config — ALB checks pod health independently of K8s probes
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "10"

    # Tags on the ALB — helps identify it in the AWS console and for cleanup
    alb.ingress.kubernetes.io/tags: Project=eks-playground,Environment=dev

  labels:
    app: nginx
spec:
  ingressClassName: alb
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nginx
            port:
              number: 80
